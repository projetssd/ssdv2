---
# === Phase 0 : Attendre que le hub soit Healthy ===
- name: Attendre que le conteneur beszel soit Healthy
  ansible.builtin.command: >
    docker inspect -f '{% raw %}{{.State.Health.Status}}{% endraw %}' {{ pgrole }}
  register: beszel_health_status
  until: beszel_health_status.stdout == "healthy"
  retries: 30
  delay: 5
  changed_when: false

# === Phase 1 : Résoudre l'IP du conteneur hub via son nom ===
- name: Résoudre l'IP du conteneur beszel
  ansible.builtin.shell:
    cmd: docker inspect -f '{% raw %}{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}{% endraw %}' {{ pgrole }}
  register: beszel_container_ip_raw
  changed_when: false

- name: Définir l'URL du hub
  ansible.builtin.set_fact:
    beszel_hub_url: "http://{{ beszel_container_ip_raw.stdout }}:{{ intport }}"

# === Phase 2 : Créer le superuser via le CLI Beszel ===
- name: Créer le superuser Beszel via CLI
  ansible.builtin.command: >
    docker exec {{ pgrole }} /beszel superuser upsert
    {{ beszel_admin_email }} {{ beszel_admin_password }}
  register: beszel_superuser
  changed_when: "'created' in beszel_superuser.stdout or 'updated' in beszel_superuser.stdout"
  failed_when: beszel_superuser.rc != 0

# === Phase 3 : Authentification PocketBase ===
- name: Authentification superuser PocketBase
  ansible.builtin.uri:
    url: "{{ beszel_hub_url }}/api/collections/_superusers/auth-with-password"
    method: POST
    body_format: json
    body:
      identity: "{{ beszel_admin_email }}"
      password: "{{ beszel_admin_password }}"
    status_code: 200
  register: beszel_auth

- name: Définir le token PocketBase
  ansible.builtin.set_fact:
    beszel_pb_token: "{{ beszel_auth.json.token }}"

# === Phase 4 : Récupération de la clé publique Hub ===
- name: Extraire la clé publique depuis le fichier id_ed25519
  become: true
  ansible.builtin.command: >
    ssh-keygen -y -f
    {{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{ pgrole }}/beszel_data/id_ed25519
  register: beszel_pubkey_raw
  changed_when: false

- name: Définir la clé publique
  ansible.builtin.set_fact:
    beszel_hub_public_key: "{{ beszel_pubkey_raw.stdout }}"

# === Phase 5 : Obtenir l'ID de l'utilisateur ===
- name: Obtenir la liste des utilisateurs
  ansible.builtin.uri:
    url: "{{ beszel_hub_url }}/api/collections/users/records"
    method: GET
    headers:
      Authorization: "Bearer {{ beszel_pb_token }}"
    status_code: 200
  register: beszel_users

- name: Définir l'ID de l'utilisateur admin
  ansible.builtin.set_fact:
    beszel_user_id: "{{ (beszel_users.json['items'] | selectattr('email', 'equalto', beszel_admin_email) | first).id }}"

# === Phase 6 : Créer un token universel (idempotent) ===
- name: Chercher un token existant pour cet utilisateur
  ansible.builtin.uri:
    url: "{{ beszel_hub_url }}/api/collections/universal_tokens/records?filter=user='{{ beszel_user_id }}'"
    method: GET
    headers:
      Authorization: "Bearer {{ beszel_pb_token }}"
    status_code: 200
  register: beszel_existing_tokens

- name: Créer un token d'enregistrement
  ansible.builtin.uri:
    url: "{{ beszel_hub_url }}/api/collections/universal_tokens/records"
    method: POST
    headers:
      Authorization: "Bearer {{ beszel_pb_token }}"
    body_format: json
    body:
      name: "ssdv2-agent-{{ pgrole }}"
      user: "{{ beszel_user_id }}"
    status_code: 200
  register: beszel_token_result
  when: beszel_existing_tokens.json['items'] | length == 0

- name: Réutiliser le token existant
  ansible.builtin.set_fact:
    beszel_token_result: "{{ { 'json': beszel_existing_tokens.json['items'][0] } }}"
  when: beszel_existing_tokens.json['items'] | length > 0

- name: Générer un token UUID
  ansible.builtin.set_fact:
    beszel_agent_token: "{{ lookup('pipe', 'uuidgen') }}"

- name: Mettre à jour le token avec la valeur générée
  ansible.builtin.uri:
    url: "{{ beszel_hub_url }}/api/collections/universal_tokens/records/{{ beszel_token_result.json.id }}"
    method: PATCH
    headers:
      Authorization: "Bearer {{ beszel_pb_token }}"
    body_format: json
    body:
      token: "{{ beszel_agent_token }}"
    status_code: 200

# === Phase 7 : Créer le système dans Beszel (idempotent) ===
- name: Chercher un système existant
  ansible.builtin.uri:
    url: "{{ beszel_hub_url }}/api/collections/systems/records?filter=name='{{ pgrole }}'"
    method: GET
    headers:
      Authorization: "Bearer {{ beszel_pb_token }}"
    status_code: 200
  register: beszel_existing_systems

- name: Créer le système dans Beszel
  ansible.builtin.uri:
    url: "{{ beszel_hub_url }}/api/collections/systems/records"
    method: POST
    headers:
      Authorization: "Bearer {{ beszel_pb_token }}"
    body_format: json
    body:
      name: "{{ pgrole }}"
      host: "{{ pgrole }}"
      port: "{{ beszel_agent_listen }}"
      users:
        - "{{ beszel_user_id }}"
    status_code: 200
  register: beszel_system_result
  when: beszel_existing_systems.json['items'] | length == 0

- name: Réutiliser le système existant
  ansible.builtin.set_fact:
    beszel_system_result: "{{ { 'json': beszel_existing_systems.json['items'][0] } }}"
  when: beszel_existing_systems.json['items'] | length > 0

# === Phase 8 : Déploiement de l'agent ===
- name: Créer le dossier de données de l'agent
  become: true
  ansible.builtin.file:
    path: "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{ pgrole }}/beszel_agent_data"
    state: directory
    mode: '0755'
    owner: "{{ lookup('env','MYUID') }}"
    group: "{{ lookup('env','MYGID') }}"

- name: Déployer beszel-agent
  community.docker.docker_container:
    name: beszel-agent
    image: "{{ beszel_agent_image }}"
    state: started
    pull: true
    restart_policy: unless-stopped
    network_mode: host
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{ pgrole }}/beszel_agent_data:/var/lib/beszel-agent:rw"
    env:
      LISTEN: "{{ beszel_agent_listen }}"
      KEY: "{{ beszel_hub_public_key }}"
      TOKEN: "{{ beszel_agent_token }}"
      HUB_URL: "https://{{ sub[pgrole][pgrole] if sub_enabled else pgrole }}.{{ user.domain }}"
