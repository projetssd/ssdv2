---
- name: 'Deploying db-{{pgrole}}'
  docker_container:
    name: 'db-{{pgrole}}'
    recreate: true
    image: 'postgres:17.2-alpine'
    pull: yes
    shm_size: 2G
    volumes:
      - "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{pgrole}}/db-{{pgrole}}:/var/lib/postgresql/data/pgdata"
    env:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "{{pgrole}}"
      POSTGRES_DB: "zilean"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    restart_policy: always
    networks:
      - name: 'traefik_proxy'
    state: started
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{ pgrole }}"]
      start_period: 60s

- name: Wait for 10 seconds before continuing
  wait_for:
    timeout: 10
