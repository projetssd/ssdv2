---
- name: Verifier si le JWT secret est defini pour Seasonarr
  set_fact:
    seasonarr_jwtsecret_exists: "{{ seasonarr is defined and seasonarr.jwtsecret is defined and seasonarr.jwtsecret is not none and (seasonarr.jwtsecret | trim | length > 0) }}"

- name: Generer un JWT secret si non defini pour Seasonarr
  set_fact:
    seasonarr_jwtsecret: "{{ lookup('password', '/dev/null length=64 chars=ascii_letters,digits') }}"
  when: not seasonarr_jwtsecret_exists

- name: Mettre a jour seasonarr.jwtsecret si genere
  set_fact:
    seasonarr: "{{ (seasonarr | default({})) | combine({'jwtsecret': (seasonarr_jwtsecret if not seasonarr_jwtsecret_exists else seasonarr.jwtsecret)}) }}"

- name: Ajouter le JWT secret dans le vault si genere
  shell: |
    source ${SETTINGS_SOURCE}/profile.sh
    manage_account_yml seasonarr.jwtsecret "{{ seasonarr.jwtsecret }}"
  args:
    executable: /bin/bash
  when: seasonarr_jwtsecret is defined
