---
- name: Create status directory if needed
  file:
    path: "{{ settings.storage }}/status"
    state: directory
    mode: "0775"

- name: Deploy watchtower
  docker_container:
    name: "watchtower"
    image: "nickfedor/watchtower:latest"
    pull: yes
    command: '--cleanup --schedule "0 0 4 * * *"'
    state: started
    restart_policy: unless-stopped
    env:
      DOCKER_API_VERSION: "1.44"  # ← Compatible avec 28.x ET 29.x
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    networks:
      - name: traefik_proxy

- name: Insert watchtower into database
  shell:
    cmd: |
      sqlite3 {{ settings.source }}/ssddb << EOF
          REPLACE INTO applications (name,status,subdomain,port)
          VALUES
          ('watchtower',2,'',0);
      EOF
