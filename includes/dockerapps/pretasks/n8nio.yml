---
- name: Check if paths is existing and creating if necessary
  become: yes
  file:
    path: "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{ pgrole }}/config"
    state: directory
    mode: '0775'
    owner: "1000"
    group: "1000"

- name: 'Deploying db-{{pgrole}}'
  docker_container:
    name: 'db-{{pgrole}}'
    recreate: true
    image: 'postgres:16-alpine'
    pull: yes
    volumes:
      - "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{pgrole}}/db-{{pgrole}}:/var/lib/postgresql"
    env:
      POSTGRES_USER: "{{pgrole}}"
      POSTGRES_PASSWORD: "{{pgrole}}"
    restart_policy: always
    networks:
      - name: 'traefik_proxy'
    state: started
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{ pgrole }}"]
      start_period: 60s

- name: Wait for 10 seconds before continuing
  wait_for:
    timeout: 10

