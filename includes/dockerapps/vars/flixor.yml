---
pgrole: 'flixor'
intport: '80'
image: 'ghcr.io/flixorui/flixor:latest'
pg_volumes:
  - "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{ pgrole }}/config:/app/config"
  - "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{ pgrole }}/cache:/app/cache"
pg_env:
  PUID: "{{ lookup('env','MYUID') }}"
  PGID: "{{ lookup('env','MYGID') }}"
  NODE_ENV: "production"
specific_docker_info:
  restart_policy: "always"
  log_driver: "journald"
  log_options:
    tag: "{{ pgrole }}"
