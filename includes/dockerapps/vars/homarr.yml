---
pgrole: 'homarr'
intport: '7575'
image: 'ghcr.io/homarr-labs/homarr:latest'
pg_volumes:
  - '/var/run/docker.sock:/var/run/docker.sock'
  - "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{ pgrole }}/appdata:/appdata"
pg_env:
  SECRET_ENCRYPTION_KEY: "{{ homarr_secret_encryption_key }}"