---
pgrole: 'tracearr'
intport: '3000'
image: 'ghcr.io/connorgallopo/tracearr:supervised'

pg_volumes:
  - "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{ pgrole }}/data:/data:rw"

pg_env:
  PUID: "{{ lookup('env','MYUID') }}"
  PGID: "{{ lookup('env','MYGID') }}"
  TZ: 'Europe/Paris'
  LOG_LEVEL: 'info'

specific_docker_info:
  shm_size: '512M'
  restart_policy: unless-stopped
