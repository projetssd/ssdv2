---
pgrole: 'scrutiny'
intport: '8080'
image: 'ghcr.io/analogj/scrutiny:master-omnibus'
pg_volumes:
  - "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{ pgrole }}/config:/opt/scrutiny/config"
  - "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{ pgrole }}/influxdb:/opt/scrutiny/influxdb"
  - "/run/udev:/run/udev:ro"
pg_env:
  PUID: "{{ lookup('env','MYUID') }}"
  PGID: "{{ lookup('env','MYGID') }}"
  TIMEZONE: "Europe/Paris"
# tags spécifiques à ajouter à la construction du docker
specific_docker_info:
  capabilities:
    - SYS_RAWIO
    - SYS_ADMIN
  devices:
    - "/dev/sda"
