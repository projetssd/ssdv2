---
pgrole: 'streamfusion'
intport: '8080'
image: 'ghcr.io/limehubs/stream-fusion:develop'
pg_volumes:
  - "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{ pgrole }}:/app/config"
pg_env:
  LOG_LEVEL: "DEBUG"
  PUID: "{{ lookup('env','MYUID') }}"
  PGID: "{{ lookup('env','MYGID') }}"
  SECRET_API_KEY: "{{ SECRET_API_KEY }}"
  TMDB_API_KEY: "{{ tmdb.apikey }}"
  REDIS_HOST: "stremio-redis"
  PG_HOST: "stremio-postgres"
  PG_BASE: "streamfusion"
  PG_USER: "streamfusion"
  PG_PASS: "streamfusion"
  USE_HTTPS: "true"
  TZ: "Europe/Paris"
docker_deploy_enabled: false

pretasks:
  - tmdb