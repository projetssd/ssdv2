pgrole: "frenchio"
intport: "7777"
image: "ghcr.io/aymene69/frenchio:latest"

pg_volumes:
  - "{{ lookup('env','HOME') }}:{{ lookup('env','HOME') }}"
  - "/etc/localtime:/etc/localtime:ro"

pg_env: {}
# pg_env:
#   PORT: "7777"
#   HTTP_PROXY: "http://proxy.example.com:8080"
#   HTTPS_PROXY: "http://proxy.example.com:8080"
#   NO_PROXY: "localhost,127.0.0.1"
#   QBITTORRENT_ENABLE: "true"
#   MANIFEST_TITLE_SUFFIX: "| ElfHosted"
#   MANIFEST_BLURB: "<b>Custom message here</b>"

specific_docker_info:
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6969/manifest.json')"]
    interval: "30s"
    timeout: "10s"
    retries: "3"
    start_period: "5s"