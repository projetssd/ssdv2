# doc: https://projetssd.github.io/ssdv2_docs/applications/media/frenchio/
# https://github.com/aymene69/frenchio

pgrole: "frenchio"
intport: "7777"
image: "ghcr.io/aymene69/frenchio:latest"

pg_volumes:
  - "{{ lookup('env','HOME') }}:{{ lookup('env','HOME') }}"
  - "/etc/localtime:/etc/localtime:ro"

pg_env:
  PORT: "7777"
  QBITTORRENT_ENABLE: "false"

specific_docker_info:
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7777/manifest.json')"]
    interval: "30s"
    timeout: "10s"
    retries: "3"
    start_period: "5s"
  ports:
    - "7777:7777"