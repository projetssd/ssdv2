---
pgrole: 'zilean'
intport: '8181'
image: 'ipromknight/zilean:latest'
pg_volumes:
  - "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{pgrole}}/data:/app/data"
  - "{{ settings.storage }}/docker/{{ lookup('env','USER') }}/{{pgrole}}/tmp:/tmp"

pg_env:
  POSTGRES_PASSWORD: "postgres"
  POSTGRES_USER: "postgres"
  POSTGRES_DB: "zilean"

specific_docker_info:
  tty: "true"
  interactive: "true"

